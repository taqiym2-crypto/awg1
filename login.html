<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sun Enenergy</title>
  <link rel="stylesheet" href="assets/login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="login-container">
    <!-- Header Logo -->
    <div class="login-header">
      <div class="logo">
        <i class="fas fa-sun"></i>
        <h1>Sun<span>Energy</span></h1>
      </div>
      <p class="login-subtitle">Monitoring Efektivitas Panel Surya</p>
    </div>

    <!-- Login Form -->
    <div class="login-form-container">
      <h2><i class="fas fa-sign-in-alt"></i> Login ke Dashboard</h2>
      
      <form id="loginForm">
        <div class="input-group">
          <label for="email">
            <i class="fas fa-envelope"></i> Email
          </label>
          <input type="email" id="email" placeholder="contoh@email.com" required>
        </div>
        
        <div class="input-group">
          <label for="password">
            <i class="fas fa-lock"></i> Password
          </label>
          <input type="password" id="password" placeholder="Masukkan password" required>
          <div class="password-toggle">
            <i class="fas fa-eye" id="togglePassword"></i>
          </div>
        </div>
        
        <div class="remember-forgot">
          <label class="checkbox-container">
            <input type="checkbox" id="remember">
            <span class="checkmark"></span>
            Ingat saya
          </label>
          <a href="#" class="forgot-link">Lupa password?</a>
        </div>
        
        <button type="submit" class="login-btn">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>
      
      <div class="login-divider">
        <span>atau lanjutkan dengan</span>
      </div>
      
      <div class="social-login">
        <button class="social-btn google">
          <i class="fab fa-google"></i> Google
        </button>
      </div>
      
      <div class="register-link">
        Belum punya akun? <a href="register.html">Daftar sekarang</a>
      </div>
    </div>
    
    <!-- Footer -->
    <div class="login-footer">
      <p>SolarTracker &copy; 2023 | Sistem Monitoring Panel Surya dengan Tracking</p>
      <p><a href="index.html"><i class="fas fa-home"></i> Kembali ke Halaman Utama</a></p>
    </div>
  </div>

  <script src="assets/login.js"></script>
</body>
</html>
