<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrasi - SunEnergy</title>
  <link rel="stylesheet" href="register.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="register-container">
    <!-- Header Logo -->
    <div class="register-header">
      <div class="logo">
        <i class="fas fa-sun"></i>
        <h1>Sun<span>Energy</span></h1>
      </div>
      <p class="register-subtitle">Buat Akun Baru</p>
    </div>

    <!-- Registration Form -->
    <div class="register-form-container">
      <form id="registerForm">
        <!-- Basic Information -->
        <div class="input-group">
          <label for="email">
            <i class="fas fa-envelope"></i> Email
          </label>
          <input type="email" id="email" placeholder="contoh@email.com" required>
        </div>
        
        <div class="input-group">
          <label for="password">
            <i class="fas fa-lock"></i> Password
          </label>
          <input type="password" id="password" placeholder="Minimal 8 karakter" required>
          <div class="password-toggle">
            <i class="fas fa-eye" id="togglePassword"></i>
          </div>
        </div>
        
        <div class="input-group">
          <label for="confirmPassword">
            <i class="fas fa-lock"></i> Konfirmasi Password
          </label>
          <input type="password" id="confirmPassword" placeholder="Ulangi password" required>
          <div class="password-toggle">
            <i class="fas fa-eye" id="toggleConfirmPassword"></i>
          </div>
        </div>
        
        <!-- Terms and Conditions -->
        <div class="terms-section">
          <label class="checkbox-container">
            <input type="checkbox" id="terms" required>
            <span class="checkmark"></span>
            Saya setuju dengan <a href="#" class="terms-link">Syarat & Ketentuan</a>
          </label>
        </div>
        
        <!-- Submit Button -->
        <button type="submit" class="register-btn">
          <i class="fas fa-user-plus"></i> Daftar Sekarang
        </button>
      </form>
      
      <!-- Alternative Registration -->
      <div class="register-divider">
        <span>atau daftar dengan</span>
      </div>
      
      <div class="social-register">
        <button class="social-btn google">
          <i class="fab fa-google"></i> Google
        </button>
      </div>
      
      <!-- Login Link -->
      <div class="login-link">
        Sudah punya akun? <a href="login.html">Login di sini</a>
      </div>
    </div>
    
    <!-- Footer -->
    <div class="register-footer">
      <p>SolarTracker &copy; 2023 | Monitoring Panel Surya</p>
    </div>
  </div>

  <script src="register.js"></script>
</body>
</html>
